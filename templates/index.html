<!DOCTYPE html>
<html>
<head>
    <title>Student Result Predictor</title>
</head>
<body>

    <h1>Student Marks Predictor</h1>

    <form action="/predict" method="post">
        <label>Enter Study Hours:</label>
        <input type="number" step="any" name="hours" required>
        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <h2>Predicted Marks: {{ result }}</h2>
    {% endif %}

</body>
</html>
