<!DOCTYPE html>
<html>
<head>
    <title>Marks Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #ff7b00;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #ff9500;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Student Marks Predictor</h1>

        <form method="POST">
            <input type="number" step="any" name="hours" placeholder="Enter study hours" required><br>
            <button type="submit">Predict Marks</button>
        </form>

        {% if prediction %}
            <h2>Predicted Marks: {{ prediction }}</h2>
        {% endif %}
    </div>

</body>
</html>
